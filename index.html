<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceCook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f7ff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }
    #app { width: 100%; max-width: 640px; }

    /* ── header ── */
    .vc-header { text-align: center; margin-bottom: 1.25rem; }
    .vc-logo { display: inline-flex; align-items: center; gap: 10px; }
    .vc-logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: #378add;
      display: flex; align-items: center; justify-content: center;
    }
    .vc-logo-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .vc-title { font-size: 24px; font-weight: 700; color: #0c447c; }

    /* ── hero: cookbot + bubble side by side ── */
    .vc-hero {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      width: 100%;
    }

    .cookbot {
      width: 52%;
      flex-shrink: 0;
      display: block;
      mix-blend-mode: multiply;
    }

    /* speech bubble takes remaining space */
    .speech-bubble {
      position: relative;
      background: #fff;
      border: 2.5px solid #b5d4f4;
      border-radius: 24px;
      padding: 1.75rem 1.5rem 1.5rem;
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      left: -20px;
      bottom: 40px;
      border: 10px solid transparent;
      border-right-color: #b5d4f4;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      left: -15px;
      bottom: 41px;
      border: 9px solid transparent;
      border-right-color: #fff;
    }

    .bubble-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: #378add; margin-bottom: 0.75rem;
    }

    .bubble-mic-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    #mic-btn {
      width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid #b5d4f4; background: #e6f1fb;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    #mic-btn:hover { background: #d0e8f8; border-color: #85b7eb; }
    #mic-btn.listening { border-color: #378add; animation: pulse 1.2s ease-in-out infinite; }
    #mic-btn svg { width: 30px; height: 30px; stroke: #378add; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    #status { font-size: 13px; color: #185fa5; line-height: 1.4; }

    .bubble-divider {
      display: flex; align-items: center; gap: 8px;
      margin: 1rem 0; font-size: 12px; color: #85b7eb;
    }
    .bubble-divider::before, .bubble-divider::after { content: ''; flex: 1; height: 0.5px; background: #b5d4f4; }

    .bubble-input-row { display: flex; gap: 8px; }
    #main-input {
      flex: 1; height: 44px;
      border: 1.5px solid #b5d4f4; border-radius: 10px;
      padding: 0 14px; font-size: 14px; color: #1a1a1a;
      background: #f0f7ff; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #main-input:focus { border-color: #378add; background: #fff; }
    #main-input::placeholder { color: #85b7eb; }
    #go-btn {
      height: 44px; padding: 0 18px;
      border: none; border-radius: 10px;
      background: #378add; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    #go-btn:hover { background: #185fa5; }
    .bubble-hint { font-size: 11px; color: #85b7eb; margin-top: 8px; }

    /* ── states ── */
    #transcript-box {
      background: #e6f1fb; border-radius: 8px;
      padding: 0.6rem 1rem; font-size: 14px;
      color: #185fa5; font-style: italic; text-align: center;
      display: none; margin-bottom: 0.75rem;
    }
    #loading {
      text-align: center; font-size: 14px;
      color: #378add; padding: 1.25rem; display: none;
    }
    .dot { display: inline-block; animation: blink 1.4s infinite; margin: 0 1px; color: #378add; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    #error-msg {
      text-align: center; font-size: 13px;
      color: #a32d2d; background: #fcebeb;
      border-radius: 8px; padding: 0.6rem 1rem;
      display: none; margin-bottom: 0.75rem;
    }

    /* ── recipe card ── */
    .vc-card {
      background: #fff; border: 0.5px solid #b5d4f4;
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
    }
    .vc-section-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #378add; margin-bottom: 0.75rem;
    }
    #recipe-card { display: none; }
    #recipe-title { font-size: 20px; font-weight: 600; color: #0c447c; margin-bottom: 1rem; }
    #ingredients-list {
      list-style: none; padding-left: 0;
      font-size: 14px; line-height: 1.9; color: #2a2a2a;
    }
    #ingredients-list li::before { content: '·'; color: #378add; font-weight: 700; margin-right: 8px; }
    #steps-list { padding-left: 1.3rem; font-size: 14px; line-height: 1.9; color: #2a2a2a; }
    #steps-list li { margin-bottom: 4px; }

    #speak-btn {
      margin-top: 1.25rem; width: 100%;
      padding: 0.6rem 1rem; font-size: 14px;
      border: 0.5px solid #b5d4f4; border-radius: 8px;
      background: #e6f1fb; color: #185fa5;
      cursor: pointer; font-weight: 500;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #speak-btn:hover { background: #d0e8f8; }
    #speak-btn.speaking { border-color: #378add; background: #d0e8f8; }

    @media (max-width: 480px) {
      .vc-hero { flex-direction: column; align-items: center; gap: 0; }
      .cookbot { width: 70%; }
      .speech-bubble { margin-bottom: 0; width: 100%; }
      .speech-bubble::before, .speech-bubble::after { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="vc-header">
    <div class="vc-logo">
      <div class="vc-logo-icon">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>
      </div>
      <span class="vc-title">VoiceCook</span>
    </div>
  </div>

  <div class="vc-hero">
    <img src="cookbot.png" alt="CookBot" class="cookbot" />

    <div class="speech-bubble">
      <div class="bubble-label">Say it</div>
      <div class="bubble-mic-row">
        <button id="mic-btn" title="Tap to speak">
          <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>
        </button>
        <div id="status">Tap to speak a dish name</div>
      </div>

      <div class="bubble-divider">or type</div>

      <div class="bubble-label">Dish name or recipe URL</div>
      <div class="bubble-input-row">
        <input id="main-input" type="text" placeholder="" />
        <button id="go-btn">Go</button>
      </div>
      <p class="bubble-hint">Paste any recipe link or type a dish name</p>
    </div>
  </div>

  <div id="transcript-box"></div>
  <div id="loading"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span>&nbsp; Finding recipe…</div>
  <div id="error-msg"></div>

  <div id="recipe-card" class="vc-card">
    <div id="recipe-title"></div>
    <div class="vc-section-label">Ingredients</div>
    <ul id="ingredients-list"></ul>
    <div class="vc-section-label" style="margin-top:1rem;">Steps</div>
    <ol id="steps-list"></ol>
    <button id="speak-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#378add" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Read recipe aloud
    </button>
  </div>

</div>
<script>
  const micBtn          = document.getElementById('mic-btn');
  const statusEl        = document.getElementById('status');
  const transcriptBox   = document.getElementById('transcript-box');
  const recipeCard      = document.getElementById('recipe-card');
  const recipeTitle     = document.getElementById('recipe-title');
  const ingredientsList = document.getElementById('ingredients-list');
  const stepsList       = document.getElementById('steps-list');
  const speakBtn        = document.getElementById('speak-btn');
  const loading         = document.getElementById('loading');
  const errorMsg        = document.getElementById('error-msg');
  const mainInput       = document.getElementById('main-input');
  const goBtn           = document.getElementById('go-btn');

  let recognition, currentRecipeText = '', speaking = false;

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
    recognition = new SpeechRec();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.onstart  = () => { micBtn.classList.add('listening'); statusEl.textContent = 'Listening…'; };
    recognition.onend    = () => { micBtn.classList.remove('listening'); statusEl.textContent = 'Tap to speak a dish name'; };
    recognition.onerror  = () => { micBtn.classList.remove('listening'); statusEl.textContent = 'Could not hear you — try again'; };
    recognition.onresult = (e) => {
      const dish = e.results[0][0].transcript.trim();
      mainInput.value = dish;
      showTranscript('"' + dish + '"');
      fetchRecipe(dish);
    };
  } else {
    statusEl.textContent = 'Voice not supported — try Chrome';
    micBtn.disabled = true;
    micBtn.style.opacity = '0.4';
  }
  micBtn.addEventListener('click', () => { if (recognition) { try { recognition.start(); } catch(e) {} } });

  goBtn.addEventListener('click', handleInput);
  mainInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInput(); });

  function handleInput() {
    const val = mainInput.value.trim();
    if (!val) return;
    showTranscript(val);
    fetchRecipe(val);
  }

  function isUrl(str) { return /^https?:\/\//i.test(str); }

  function showTranscript(text) {
    transcriptBox.style.display = 'block';
    transcriptBox.textContent = text;
  }

  function startLoading() {
    recipeCard.style.display = 'none';
    errorMsg.style.display = 'none';
    loading.style.display = 'block';
  }

  function showError(msg) {
    loading.style.display = 'none';
    errorMsg.style.display = 'block';
    errorMsg.textContent = msg;
  }

  function renderRecipe(recipe) {
    recipeTitle.textContent = recipe.title;
    ingredientsList.innerHTML = recipe.ingredients.map(i => `<li>${i}</li>`).join('');
    stepsList.innerHTML = recipe.steps.map(s => `<li>${s}</li>`).join('');
    currentRecipeText = recipe.title + '. Ingredients: ' + recipe.ingredients.join(', ') + '. Steps: ' + recipe.steps.join(' ');
    loading.style.display = 'none';
    recipeCard.style.display = 'block';
    statusEl.textContent = 'Recipe ready!';
    speakRecipe();
  }

  async function fetchRecipe(input) {
    startLoading();
    const prompt = isUrl(input)
      ? `A user wants to cook a recipe from this URL: ${input}\n\nUsing your knowledge of popular recipes, extract or infer what the recipe at this URL likely contains. Respond ONLY in JSON with no markdown, no backticks, no extra text: {"title":"...","ingredients":["..."],"steps":["..."]}`
      : `Give me a simple home recipe for "${input}". Respond ONLY in JSON with no markdown, no backticks, no extra text: {"title":"...","ingredients":["..."],"steps":["..."]}`;
    try {
      const res = await fetch('/api/recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      renderRecipe(data);
    } catch(err) {
      showError('Could not fetch recipe — please try again.');
    }
  }

  function speakRecipe() {
    if (!window.speechSynthesis || !currentRecipeText) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(currentRecipeText);
    utt.rate = 0.88;
    utt.onstart = () => {
      speaking = true;
      speakBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#378add" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Stop reading';
      speakBtn.classList.add('speaking');
    };
    utt.onend = utt.onerror = () => {
      speaking = false;
      speakBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#378add" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Read recipe aloud';
      speakBtn.classList.remove('speaking');
    };
    speechSynthesis.speak(utt);
  }

  speakBtn.addEventListener('click', () => {
    if (speaking) { speechSynthesis.cancel(); } else { speakRecipe(); }
  });
</script>
</body>
</html>
