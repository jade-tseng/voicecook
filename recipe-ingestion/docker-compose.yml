services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cookbot
      POSTGRES_PASSWORD: cookbot
      POSTGRES_DB: cookbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cookbot:cookbot@postgres:5432/cookbot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./pytest.ini:/app/pytest.ini

volumes:
  pgdata:
