<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beef Tacos</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["Recipe", "Thing"],
  "name": "Beef Tacos",
  "recipeIngredient": [
    "500g ground beef",
    "1 packet taco seasoning",
    "8 small corn tortillas",
    "1 cup shredded cheddar",
    "1 cup shredded lettuce",
    "2 roma tomatoes, diced",
    "Sour cream and salsa to serve"
  ],
  "recipeInstructions": [
    {
      "@type": "HowToStep",
      "name": "Brown the beef",
      "text": "Cook ground beef in a skillet over medium-high heat, breaking it apart, until no longer pink."
    },
    {
      "@type": "HowToStep",
      "name": "Season",
      "text": "Drain excess fat. Add taco seasoning and water according to packet directions. Simmer 5 minutes."
    },
    {
      "@type": "HowToStep",
      "name": "Warm tortillas",
      "text": "Warm tortillas in a dry skillet or directly over a gas flame for 30 seconds per side."
    },
    {
      "@type": "HowToStep",
      "name": "Assemble",
      "text": "Fill each tortilla with beef, then top with cheese, lettuce, tomato, sour cream and salsa."
    }
  ],
  "totalTime": "PT25M",
  "recipeYield": "4",
  "image": [
    "https://example.com/tacos-16x9.jpg",
    "https://example.com/tacos-square.jpg"
  ]
}
</script>
</head>
<body>
<h1>Beef Tacos</h1>
</body>
</html>
